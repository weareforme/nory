<!-- UTM -->
<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var utms = {
            utm_source: params.get('utm_source'),
            utm_medium: params.get('utm_medium'),
            utm_campaign: params.get('utm_campaign'),
            utm_term: params.get('utm_term'),
            utm_content: params.get('utm_content'),
        };

        if (utms.utm_source && !sessionStorage.getItem('nory_utms')) {
            sessionStorage.setItem('nory_utms', JSON.stringify(utms));
        }
    })();

    window.getSessionUTMs = function () {
        var stored = sessionStorage.getItem('nory_utms');
        return stored ? JSON.parse(stored) : {};
    };
</script>

    (function () {

        // including when user accepts/rejects after initial page load
